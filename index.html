<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亲戚长辈防破防太极拳发牌机</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  :root {
    --bg-dark: #2a1a0e;
    --paper: #f5e6c8;
    --paper-dark: #e8d4a8;
    --red: #c0392b;
    --gold: #d4a017;
    --gold-light: #f0c040;
    --green-card: #2d5a27;
    --blue-card: #1a3a5c;
    --text-dark: #1a0f00;
    --text-mid: #3d2410;
    --border-gold: #b8860b;
    /* fluid font base: scales from 14px @320px to 16px @480px */
    --fs-base: clamp(13px, 3.5vw, 15px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: var(--fs-base); }

  body {
    font-family: 'Noto Serif SC', serif;
    background-color: var(--bg-dark);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(180,80,20,.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(180,80,20,.10) 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 20px,
        rgba(255,255,255,.015) 20px, rgba(255,255,255,.015) 21px);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    /* safe area padding for notched phones */
    padding: max(12px, env(safe-area-inset-top))
             max(12px, env(safe-area-inset-right))
             max(16px, env(safe-area-inset-bottom))
             max(12px, env(safe-area-inset-left));
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 2.5vw, 14px);
  }

  /* ── Side banner – hide on very narrow screens ── */
  .side-banner {
    display: none; /* hidden on mobile to save space */
  }

  /* ── Top nav ── */
  .top-nav {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    z-index: 1;
  }
  .nav-btn {
    background: var(--paper);
    border: 2px solid var(--border-gold);
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    font-size: 0.73rem;
    color: var(--text-dark);
    font-family: inherit;
    box-shadow: 2px 2px 0 rgba(0,0,0,.3);
    transition: transform .1s;
    /* bigger tap target */
    min-width: 52px;
    min-height: 48px;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.95); }
  .nav-btn .icon { font-size: 1.2rem; }

  /* ── Header ── */
  .header {
    background: radial-gradient(ellipse at top, #fff6e0 0%, #f0d898 100%);
    border-radius: 12px;
    padding: clamp(12px, 4vw, 20px) clamp(10px, 3vw, 16px) clamp(10px, 3vw, 16px);
    text-align: center;
    border: 3px solid var(--border-gold);
    box-shadow: 0 4px 16px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3);
    overflow: hidden;
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 30px,
      rgba(180,130,60,.06) 30px, rgba(180,130,60,.06) 31px);
    pointer-events: none;
  }

  .header-chars {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    margin-bottom: 6px;
  }
  .char-img {
    font-size: clamp(44px, 12vw, 64px);
    line-height: 1;
    flex-shrink: 0;
  }

  .header-title { position: relative; z-index: 1; }
  .title-main {
    font-size: clamp(18px, 5.5vw, 26px);
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: 1px;
  }
  .title-main .highlight { color: var(--red); text-shadow: 1px 1px 0 rgba(0,0,0,.2); }
  .title-main .normal    { color: var(--text-dark); }
  .title-sub {
    margin-top: 6px;
    font-size: clamp(10px, 2.8vw, 13px);
    color: #777;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
  }

  /* ── Panel (attack cards wrapper) ── */
  .panel {
    background: var(--paper);
    border-radius: 10px;
    border: 2px solid var(--border-gold);
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,.3);
  }
  .panel-header {
    background: linear-gradient(135deg, var(--paper-dark), var(--paper));
    border-bottom: 2px solid var(--border-gold);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: clamp(12px, 3.2vw, 15px);
    font-weight: 700;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .arrow-deco { color: var(--gold); font-size: .8em; }

  .refresh-btn {
    background: transparent;
    border: 1.5px solid var(--border-gold);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: clamp(11px, 2.8vw, 13px);
    color: var(--text-mid);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background .2s;
    min-height: 36px;
  }
  .refresh-btn:active { background: var(--paper-dark); }

  /* ── Attack cards horizontal scroll ── */
  .attack-cards {
    padding: 10px;
    display: flex;
    gap: clamp(6px, 2vw, 10px);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .attack-cards::-webkit-scrollbar { display: none; }

  .attack-card {
    flex: 0 0 clamp(68px, 18vw, 88px);
    scroll-snap-align: start;
    background: var(--paper-dark);
    border: 2px solid var(--border-gold);
    border-radius: 8px;
    padding: 8px 5px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    /* slightly bigger touch area via min-height */
    min-height: 88px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .attack-card:active { transform: scale(.96); }
  .attack-card.active {
    border-color: var(--red);
    background: #fff5f5;
    box-shadow: 0 0 0 2px rgba(192,57,43,.3), 0 4px 12px rgba(0,0,0,.2);
    transform: translateY(-3px);
  }
  .attack-card.active::before {
    content: '!?';
    position: absolute;
    top: -10px; left: -8px;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 900;
    width: 20px; height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 1px 1px 4px rgba(0,0,0,.3);
  }
  .card-icon {
    width: clamp(32px, 8.5vw, 42px);
    height: clamp(32px, 8.5vw, 42px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 4.5vw, 22px);
    flex-shrink: 0;
  }
  .icon-red    { background: var(--red); }
  .icon-purple { background: #7b2d8b; }
  .icon-blue   { background: #1a5276; }
  .icon-orange { background: #d35400; }
  .icon-teal   { background: #1a7a5e; }

  .card-name {
    font-size: clamp(10px, 2.8vw, 13px);
    font-weight: 700;
    color: var(--text-dark);
  }
  .card-desc {
    font-size: clamp(8px, 2vw, 10px);
    color: #666;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Response section ── */
  .response-section {
    background: linear-gradient(135deg, #2a1a0e, #3d2410);
    border-radius: 10px;
    border: 2px solid var(--border-gold);
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,.4);
  }
  .response-header {
    padding: 9px 12px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-bottom: 1px solid rgba(212,160,23,.3);
  }
  .response-title {
    font-size: clamp(12px, 3.2vw, 15px);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 1px;
  }
  .yin-yang { font-size: 1.1rem; }

  /* ── 3-column response cards ── */
  .response-cards {
    padding: clamp(8px, 2.5vw, 12px);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(6px, 2vw, 10px);
  }

  .response-card {
    border-radius: 10px;
    padding: clamp(8px, 2.5vw, 14px) clamp(6px, 2vw, 10px) clamp(8px, 2.5vw, 12px);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform .2s;
    /* fluid min-height so cards don't collapse on tiny screens */
    min-height: clamp(130px, 38vw, 180px);
  }
  .response-card:active { transform: scale(.97); }

  .card-red   { background: linear-gradient(160deg,#f5e6c8,#eedbb0); border: 2px solid #8b2020; box-shadow: 0 4px 12px rgba(0,0,0,.35); }
  .card-green { background: linear-gradient(160deg,#f0f5e8,#e0ead0); border: 2px solid #2d5a27; box-shadow: 0 4px 12px rgba(0,0,0,.35); }
  .card-blue  { background: linear-gradient(160deg,#e8f0f5,#d0dce8); border: 2px solid #1a3a5c; box-shadow: 0 4px 12px rgba(0,0,0,.35); }

  .card-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 6px;
    border-radius: 10px;
    font-size: clamp(9px, 2.2vw, 11px);
    font-weight: 700;
    margin-bottom: 8px;
    align-self: flex-start;
    white-space: nowrap;
  }
  .badge-red   { background: var(--red);        color: #fff; }
  .badge-green { background: var(--green-card);  color: #c8e6c9; }
  .badge-blue  { background: var(--blue-card);   color: #bbdefb; }

  .card-content {
    font-size: clamp(10px, 2.8vw, 13px);
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.55;
    flex: 1;
  }
  .card-footer {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(0,0,0,.1);
  }
  .panda-icon { font-size: 1.1rem; }
  .card-label {
    font-size: clamp(9px, 2.2vw, 11px);
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    color: #fff;
    white-space: nowrap;
  }
  .label-red   { background: var(--red); }
  .label-green { background: var(--green-card); }
  .label-blue  { background: var(--blue-card); }

  /* ── Action buttons ── */
  .action-row {
    display: flex;
    gap: clamp(8px, 2.5vw, 12px);
  }
  .btn-primary {
    flex: 1;
    border: 2px solid #8b6914;
    border-radius: 10px;
    padding: clamp(12px, 3.5vw, 16px) 8px;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 3px 8px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3);
    background-size: 200% auto;
    animation: shimmer 3s linear infinite;
    background-image: linear-gradient(135deg,#c8a030 0%,#e8c050 25%,#f5d060 50%,#e8c050 75%,#c8a030 100%);
  }
  .btn-primary:active { transform: scale(.97); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
  .btn-primary .btn-main {
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 900;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-primary .btn-sub {
    font-size: clamp(10px, 2.5vw, 12px);
    color: #5a3e10;
    margin-top: 2px;
  }
  .btn-secondary {
    background: var(--paper-dark);
    border: 2px solid var(--border-gold);
    border-radius: 10px;
    padding: clamp(12px, 3.5vw, 16px) clamp(10px, 3vw, 16px);
    cursor: pointer;
    font-family: inherit;
    font-size: clamp(12px, 3vw, 14px);
    font-weight: 700;
    color: var(--text-dark);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
    box-shadow: 0 3px 8px rgba(0,0,0,.2);
  }
  .btn-secondary:active { background: var(--paper); }

  /* ── Bottom info row – stacks on narrow screens ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(8px, 2.5vw, 12px);
  }
  /* make disclaimer span full width on mobile */
  .disclaimer-card {
    grid-column: 1 / -1;
  }

  /* on wider screens (≥440px) show 3 columns again */
  @media (min-width: 440px) {
    .bottom-row { grid-template-columns: 1fr 1fr 1fr; }
    .disclaimer-card { grid-column: auto; }
  }

  .info-card {
    background: var(--paper);
    border: 2px solid var(--border-gold);
    border-radius: 8px;
    padding: clamp(8px, 2.5vw, 12px);
    font-size: clamp(10px, 2.5vw, 12px);
  }
  .tips-card .tips-title {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 5px;
    font-size: clamp(11px, 2.8vw, 13px);
  }
  .tips-card ol {
    list-style: decimal;
    padding-left: 14px;
    color: var(--text-mid);
    line-height: 1.9;
  }
  .stats-card {
    text-align: center;
    background: linear-gradient(135deg,#2a1a0e,#3d2410);
    border-color: var(--gold);
  }
  .stats-title {
    color: var(--gold-light);
    font-weight: 700;
    font-size: clamp(11px, 2.8vw, 13px);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .stats-grid { display: flex; flex-direction: column; gap: 5px; }
  .stat-item { display: flex; align-items: center; gap: 5px; color: var(--paper); font-size: clamp(10px, 2.5vw, 12px); }
  .stat-num { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: var(--gold-light); }

  .disclaimer-card { font-size: clamp(9px, 2.2vw, 11px); line-height: 1.65; color: var(--text-mid); }
  .disclaimer-title {
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 700;
    color: #c0392b;
    margin-bottom: 5px;
    font-size: clamp(10px, 2.5vw, 12px);
  }

  /* ── Animations ── */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 22px;
    animation: burstAnim .8s ease forwards;
  }
  @keyframes burstAnim {
    0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
    100% { transform: scale(3) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="side-banner">过年·社交修罗场</div>

<div class="app">

  <!-- Top nav -->
  <div class="top-nav">
    <button class="nav-btn" onclick="alert('牌库功能开发中～')">
      <span class="icon">📖</span>
      <span>我的牌库</span>
    </button>
    <button class="nav-btn" onclick="alert('设置功能开发中～')">
      <span class="icon">⚙️</span>
      <span>设置</span>
    </button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-chars">
      <div class="char-img">🧓</div>
      <div class="header-title">
        <div class="title-main">
          <span class="normal">亲戚长辈</span><span class="highlight">防破防</span>
        </div>
        <div class="title-main">
          <span class="normal">太极拳发牌机</span>
        </div>
        <div class="title-sub">
          <span>遇事不慌</span>·<span>随机应变</span>·<span>四两拨千斤</span>
        </div>
      </div>
      <div class="char-img">🧑</div>
    </div>
  </div>

  <!-- Attack Cards -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <span class="arrow-deco">→</span>
        对方打出的"攻击牌"
        <span class="arrow-deco">←</span>
      </div>
      <button class="refresh-btn" onclick="shuffleAttack()">
        ↻ 换一批
      </button>
    </div>
    <div class="attack-cards" id="attackCards">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Response Cards -->
  <div class="response-section">
    <div class="response-header">
      <span class="yin-yang">☯</span>
      <span class="response-title">请抽取你的"太极应对牌"</span>
      <span class="yin-yang">☯</span>
    </div>
    <div class="response-cards" id="responseCards">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="btn-primary" onclick="drawCards()">
      <div class="btn-main">↻ 再抽一组</div>
      <div class="btn-sub">换一组应对策略</div>
    </button>
    <button class="btn-secondary" onclick="saveCards()">
      ★ 收藏这组牌
    </button>
  </div>

  <!-- Bottom info -->
  <div class="bottom-row">
    <div class="info-card tips-card">
      <div class="tips-title">💡 使用小贴士</div>
      <ol>
        <li>保持微笑，语气平和</li>
        <li>见招拆招，灵活应变</li>
        <li>太极的精髓：以柔克刚</li>
        <li>保护自己，快乐过年！</li>
      </ol>
    </div>

    <div class="info-card stats-card">
      <div class="stats-title">→ 牌库统计 ←</div>
      <div class="stats-grid">
        <div class="stat-item">
          <span>❤️</span>
          <span class="stat-num">8</span>
          <span>类攻击牌</span>
        </div>
        <div class="stat-item">
          <span>⚡</span>
          <span class="stat-num">24</span>
          <span>种应对策略</span>
        </div>
        <div class="stat-item">
          <span>🃏</span>
          <span class="stat-num">72</span>
          <span>张太极牌</span>
        </div>
      </div>
    </div>

    <div class="info-card disclaimer-card">
      <div class="disclaimer-title">⚠️ 免责声明</div>
      本发牌机仅供娱乐参考，请根据实际情况灵活使用，不建议过度使用"发疯流"，以免引发家庭大战哦！
      <span style="font-size:16px">🐼</span>
    </div>
  </div>

</div>

<script>
// 每张攻击牌都有专属的三种流派应对话术
const attackData = [
  {
    icon: '❤️', iconClass: 'icon-red', name: '催婚', desc: '怎么还不找对象啊？年纪不小了吧？',

      '我对婚姻很认真，正因为认真才不随便，请放心。',

  },
  {
    icon: '💰', iconClass: 'icon-purple', name: '问收入', desc: '一个月工资多少啊？年终奖有多少？',

let currentAttackIndex = 0;
let displayedAttackIndices = [0, 1, 2, 3, 4]; // which 5 to show
let savedCards = [];
let currentResponse = null;
let usedCrazy = [], usedBlur = [], usedSincere = [];

function getRandom(arr, used) {
  // Avoid repeat until exhausted
  let available = arr.filter((_, i) => !used.includes(i));
  if (available.length === 0) { used.length = 0; available = arr; }
  const idx = Math.floor(Math.random() * available.length);
  const item = available[idx];
  used.push(arr.indexOf(item));
  return item;
}

function renderAttackCards() {
  const container = document.getElementById('attackCards');
  container.innerHTML = '';
  displayedAttackIndices.forEach((dataIdx, slotIdx) => {
    const card = attackData[dataIdx];
    const div = document.createElement('div');
    div.className = 'attack-card' + (dataIdx === currentAttackIndex ? ' active' : '');
    div.innerHTML = `
      <div class="card-icon ${card.iconClass}">${card.icon}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-desc">${card.desc}</div>
    `;
    div.onclick = () => {
      currentAttackIndex = dataIdx;
      usedCrazy = []; usedBlur = []; usedSincere = [];
      renderAttackCards();
      drawCards();
    };
    container.appendChild(div);
  });
}

function drawCards() {
  const attack = attackData[currentAttackIndex];
  const crazy = getRandom(attack.crazy, usedCrazy);
  const blur = getRandom(attack.blur, usedBlur);
  const sincere = getRandom(attack.sincere, usedSincere);

  currentResponse = { attack: attack.name, crazy, blur, sincere };

  const container = document.getElementById('responseCards');
  container.innerHTML = `
    <div class="response-card card-red" style="opacity:0">
      <span class="card-type-badge badge-red">🔥 发疯流</span>
      <div class="card-content">${crazy}</div>
      <div class="card-footer">
        <span class="panda-icon">🐼</span>
        <span class="card-label label-red">直接发疯！</span>
      </div>
    </div>
    <div class="response-card card-green" style="opacity:0">
      <span class="card-type-badge badge-green">⊙ 糊弄流</span>
      <div class="card-content">${blur}</div>
      <div class="card-footer">
        <span class="panda-icon">🐼</span>
        <span class="card-label label-green">岔开话题！</span>
      </div>
    </div>
    <div class="response-card card-blue" style="opacity:0">
      <span class="card-type-badge badge-blue">🛡 真诚反击流</span>
      <div class="card-content">${sincere}</div>
      <div class="card-footer">
        <span class="panda-icon">🐼</span>
        <span class="card-label label-blue">真诚反击！</span>
      </div>
    </div>
  `;

  setTimeout(() => {
    const cards = container.querySelectorAll('.response-card');
    cards.forEach((c, i) => {
      setTimeout(() => {
        c.style.transition = 'opacity 0.3s, transform 0.3s';
        c.style.opacity = '1';
        c.style.transform = 'translateY(0)';
      }, i * 120);
      c.style.transform = 'translateY(16px)';
    });
  }, 10);

  burst();
}

function burst() {
  const emojis = ['✨', '🎉', '🎊', '💫', '⭐'];
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (30 + Math.random() * 40) + '%';
      el.style.top = (40 + Math.random() * 20) + '%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }, i * 100);
  }
}

function shuffleAttack() {
  // Shift display window, cycling through all 8 attack cards
  const first = displayedAttackIndices.shift();
  const next = (displayedAttackIndices[displayedAttackIndices.length - 1] + 1) % attackData.length;
  displayedAttackIndices.push(next);
  // If current selected is no longer visible, pick first displayed
  if (!displayedAttackIndices.includes(currentAttackIndex)) {
    currentAttackIndex = displayedAttackIndices[0];
  }
  usedCrazy = []; usedBlur = []; usedSincere = [];
  renderAttackCards();
  drawCards();
}

function saveCards() {
  if (currentResponse) {
    savedCards.push(currentResponse);
    alert(`✅ 已收藏「${currentResponse.attack}」这组牌！\n当前共收藏 ${savedCards.length} 组`);
  }
}
